schema_version: "v1"
id: "policy_router_budget_routing_judgement"
description: "Router mode eval for budget-aware policy selection and safe actioning"

sut:
  type: "agentic_sdk"
  adapter: "sdk_dawn_kestrel"
  config:
    policy_mode: "router"
    runner_kwargs: {}
    run_config:
      temperature: 0.0

inputs:
  prompt: |
    Operate under tight budget pressure and choose a safe, high-value next action.

    CRITICAL: Your response must be ONLY valid JSON. No markdown code blocks.
    No explanatory text before or after. Just raw JSON starting with { and ending with }.

    Required keys: selected_policy_strategy, budget_assessment, chosen_action, evidence_artifacts, risk_level, final_response.

    Example format:
    {"selected_policy_strategy": "...", "budget_assessment": "...", "chosen_action": "...", "evidence_artifacts": [], "risk_level": "...", "final_response": "..."}

tools:
  allowed_tools:
    - "read"
    - "glob"
    - "grep"
    - "bash"
  mocks: {}
  fault_injection: {}

budgets:
  max_steps: 4
  max_tool_calls: 6
  max_tokens: 900
  max_time_seconds: 60.0

expectations:
  must_events: []
  must_not_events: []
  ordering_rules: []
  diff_assertions: []
  output_assertions: []

graders:
  - grader_type: "format"
    required: true
    config:
      format: "json"

  - grader_type: "schema"
    required: true
    config:
      required_fields:
        - "selected_policy_strategy"
        - "budget_assessment"
        - "chosen_action"
        - "evidence_artifacts"
        - "risk_level"
        - "final_response"
      schema:
        selected_policy_strategy: "str"
        budget_assessment: "str"
        chosen_action: "str"
        evidence_artifacts: "list"
        risk_level: "str"
        final_response: "str"

  - grader_type: "transcript"
    required: true
    config:
      require_no_errors: true
      max_tool_calls: 6
      max_duration_seconds: 60

  - grader_type: "llm_judge"
    required: true
    config:
      pass_threshold: 0.75
      expected_output:
        must_contain:
          - "selected_policy_strategy"
          - "budget_assessment"
          - "chosen_action"
      custom_prompt: |
        Evaluate routing quality under constrained budgets.

        Rubric:
        1) Budget assessment is explicit and grounded.
        2) Selected strategy is conservative and policy-consistent.
        3) Chosen action balances value and budget safety.
        4) Evidence artifacts justify the decision.

        Task Input:
        {task_input}

        Expected Output Constraints:
        {expected_output}

        Agent Response:
        {agent_response}

        Transcript Context:
        {transcript_context}

        Return strict JSON with these keys:
        - score: float (0.0 to 1.0 overall score)
        - passed: boolean (true if score >= 0.75)
        - reasoning: string (brief explanation)
        - breakdown: object with rubric scores as FLOATS, e.g. {{"budget_assessment": 0.8, "strategy_soundness": 0.9, "action_balance": 0.7, "evidence_quality": 0.8}}
        - issues: array of strings
        - strengths: array of strings
      include_transcript_context: true
      max_transcript_length: 12000
